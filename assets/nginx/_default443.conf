# Port 443 catch-all — eşleşmeyen SNI/Host buraya düşer. default_server AÇIKÇA
# işaretli — nginx conf.d dosyaları alfabetik yüklendiği için bu işaret olmasa bir
# tenant ya da panel vhost'u dosya sırasına göre YANLIŞLIKLA 443'ün varsayılanı
# olabilirdi (bkz. internal/panelayarlari — panel özel domaini bu portu paylaşıyor).
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    ssl_certificate     /etc/ssl/sanalpanel/panel.crt;
    ssl_certificate_key /etc/ssl/sanalpanel/panel.key;

    root /var/www/_default80;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    access_log /var/log/nginx/default443.access.log;
    error_log  /var/log/nginx/default443.error.log warn;
}
