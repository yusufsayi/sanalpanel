# Port 80 catch-all — eşleşmeyen Host header'lar buraya düşer
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/_default80;
    index index.html;

    # Henüz tenant vhost'u olmayan domainler (ör. panel için seçilen özel domain) buraya
    # düşer — acme.sh HTTP-01 doğrulaması bu location olmadan 404 alır.
    location /.well-known/acme-challenge/ {
        root /var/www/_acme;
    }

    location / {
        try_files $uri /index.html;
    }

    access_log /var/log/nginx/default80.access.log;
    error_log  /var/log/nginx/default80.error.log warn;
}
