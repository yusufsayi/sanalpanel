# Panel admin arayüzü — port 8443 (Plesk modeli)
server {
    listen 8443 ssl default_server;
    ssl_certificate /etc/ssl/girginospanel/panel.crt;
    ssl_certificate_key /etc/ssl/girginospanel/panel.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    http2 on;
    error_page 497 =301 https://$host:$server_port$request_uri;
    listen [::]:8443 ssl default_server;
    server_name _;

    # GOSP-PANEL-SEC v2
    # Panel guvenlik header'lari (server seviyesi; SPA + pma-php miras alir).
    # CSP SIKI ama pma satir-ici script'lerine uyumlu ('unsafe-inline'/'unsafe-eval').
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10240m;
    client_body_timeout 3600s;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_request_buffering off;

    root /opt/girginospanel/frontend-dist;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, immutable";
        # Kendi add_header'i oldugu icin server-seviyesi guvenlik header'lari tekrar
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }
    location = /healthz {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    location / {
        # GOSP-PANEL-NOCACHE v1
        # SPA index.html HER ZAMAN taze (panel guncellemesi sonrasi bayat UI + eski hash'li
        # asset referanslari onlenir). Hash'li /assets/ immutable KALIR (ayri blok).
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires 0 always;
        # Kendi add_header'i oldugu icin server-seviyesi guvenlik header'lari tekrar
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri $uri/ /index.html;
    }

    access_log /var/log/nginx/panel.access.log;
    error_log  /var/log/nginx/panel.error.log warn;

# phpMyAdmin + signon endpoint (panel'in 8443 vhost'una eklenir)
# Bu dosya _panel.conf'un sonuna include edilir.

location = /pma-signon.php {
    root /opt/girginospanel/pma-signon;
    fastcgi_pass unix:/run/php-fpm/phpmyadmin.sock;
    fastcgi_param SCRIPT_FILENAME /opt/girginospanel/pma-signon/pma-signon.php;
    include fastcgi_params;
}

location ^~ /pma/ {
    alias /opt/phpmyadmin/;
    index index.php;

    location ~ ^/pma/(.+\.php)$ {
        alias /opt/phpmyadmin/$1;
        fastcgi_pass unix:/run/php-fpm/phpmyadmin.sock;
        fastcgi_param SCRIPT_FILENAME /opt/phpmyadmin/$1;
        fastcgi_param SCRIPT_NAME /pma/$1;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    location ~ ^/pma/(.+\.(jpg|jpeg|gif|css|png|js|ico|html|xml|txt|svg|woff2?|map))$ {
        alias /opt/phpmyadmin/$1;
        expires 7d;
        add_header Cache-Control "public, immutable";
        # Kendi add_header'i oldugu icin server-seviyesi guvenlik header'lari tekrar
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}

}
