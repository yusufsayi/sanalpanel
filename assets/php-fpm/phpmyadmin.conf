[phpmyadmin]
user = apache
group = apache
listen = /run/php-fpm/phpmyadmin.sock
listen.owner = nginx
listen.group = nginx
listen.mode = 0660

pm = ondemand
pm.max_children = 8
pm.process_idle_timeout = 30s
pm.max_requests = 200

chdir = /
catch_workers_output = yes
clear_env = no

; pma session dosyalari ve tmp
env[PMA_TMP] = /var/lib/phpmyadmin/tmp
php_value[session.save_handler] = files
php_value[session.save_path]    = /var/lib/phpmyadmin/sessions
php_value[session.gc_maxlifetime] = 3600
php_value[upload_max_filesize]  = 64M
php_value[post_max_size]        = 64M
php_value[memory_limit]         = 256M
php_value[max_input_vars]      = 10000
php_value[max_execution_time]   = 60
php_value[date.timezone]        = Europe/Istanbul
; GCP/cloud: phpMyAdmin DB'ye TCP dış-IP yerine SOCKET ile baglanir (host=localhost) →
; DB-user'larin @localhost (socket) kaydiyla eslesir; dis IP NIC'te olmayan cloud'da hairpin/denied olmaz.
php_value[mysqli.default_socket] = /var/lib/mysql/mysql.sock
php_value[pdo_mysql.default_socket] = /var/lib/mysql/mysql.sock
