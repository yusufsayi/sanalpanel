[roundcube]
user = apache
group = apache
listen = /run/php-fpm/roundcube.sock
listen.owner = nginx
listen.group = nginx
listen.mode = 0660

pm = ondemand
pm.max_children = 10
pm.process_idle_timeout = 30s
pm.max_requests = 200

chdir = /
catch_workers_output = yes
clear_env = no

; roundcube session + temp dosyaları
php_value[session.save_handler] = files
php_value[session.save_path]    = /var/lib/roundcube/sessions
php_value[session.gc_maxlifetime] = 3600
php_value[upload_max_filesize]  = 25M
php_value[post_max_size]        = 25M
php_value[memory_limit]         = 128M
php_value[max_execution_time]   = 60
php_value[date.timezone]        = Europe/Istanbul
; phpMyAdmin ile aynı sebep: cloud'da dış-IP yerine SOCKET (host=localhost DB-user kaydıyla eşleşir).
php_value[mysqli.default_socket] = /var/lib/mysql/mysql.sock
php_value[pdo_mysql.default_socket] = /var/lib/mysql/mysql.sock
